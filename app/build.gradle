 * For more details on building Java & JVM projects, please refer to https://docs.gradle.org/9.2.0/userguide/building_java_projects.html in the Gradle documentation.
 */

plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'jacoco'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(19)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'pokedex.Main'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

tasks.named('run', JavaExec) {
    standardInput = System.in
}


tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

// Se estiver usando o plugin 'application' para rodar com ./gradlew run:
run {
    standardInput = System.in
    jvmArgs = ["-Dfile.encoding=UTF-8"]
}

jacocoTestReport {
    dependsOn test // Garante que o relatório só roda depois que os testes passarem
    reports {
        xml.required = true
        html.required = true // Ativa o relatório HTML que você vai abrir no navegador
    }

    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                'pokedex/ui/**'
            ])
        }))
    }
}

// Faz com que toda vez que você rodar './gradlew test', o relatório do JaCoCo seja gerado automaticamente
test {
    finalizedBy jacocoTestReport 
}